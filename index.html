<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Revalidatie VR - Cross-Platform</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <script>
        // ==============================================
        // 0. PLATFORM MANAGER
        // ==============================================
        AFRAME.registerComponent('platform-manager', {
            init: function() {
                const scene = this.el;
                const pcCursor = document.querySelector('#pc-cursor');

                scene.addEventListener('enter-vr', () => {
                    if (scene.is('vr-mode') && pcCursor) {
                        pcCursor.setAttribute('visible', 'false');
                    }
                });

                scene.addEventListener('exit-vr', () => {
                    if (pcCursor) {
                        pcCursor.setAttribute('visible', 'true');
                    }
                });
            }
        });

        // ==============================================
        // 0.1 CANVAS SCRIPT
        // ==============================================
        AFRAME.registerComponent('dynamische-tekst', {
            schema: {
                tekst: {type: 'string', default: ''},
                kleur: {type: 'string', default: '#FFFFFF'},
                bgKleur: {type: 'string', default: 'transparent'},
                fontSize: {type: 'number', default: 60}
            },
            init: function() {
                this.canvas = document.createElement('canvas');
                this.canvas.width = 1024;
                this.canvas.height = 256;
                this.ctx = this.canvas.getContext('2d');
                this.texture = new THREE.CanvasTexture(this.canvas);
                
                const pasTextuurToe = () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (mesh) {
                        mesh.material.map = this.texture;
                        if (this.data.bgKleur === 'transparent') { 
                            mesh.material.transparent = true; 
                        }
                        mesh.material.needsUpdate = true;
                    }
                };

                if (this.el.getObject3D('mesh')) { 
                    pasTextuurToe(); 
                } else { 
                    this.el.addEventListener('object3dset', (e) => { 
                        if (e.detail.type === 'mesh') pasTextuurToe(); 
                    }); 
                }
                
                this.tekenTekst();
            },
            update: function(oudeData) {
                if (this.data.tekst !== oudeData.tekst) { 
                    this.tekenTekst(); 
                }
            },
            tekenTekst: function() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                if (this.data.bgKleur !== 'transparent') {
                    this.ctx.fillStyle = this.data.bgKleur;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }
                
                this.ctx.fillStyle = this.data.kleur;
                this.ctx.font = `bold ${this.data.fontSize}px Arial`;
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.ctx.fillText(this.data.tekst, this.canvas.width / 2, this.canvas.height / 2);
                
                if (this.texture) {
                    this.texture.needsUpdate = true;
                }
            }
        });

        // ==============================================
        // 1. GAME MANAGER
        // ==============================================
        AFRAME.registerComponent('game-manager', {
            init: function() {
                this.menuWereld = document.querySelector('#menu-wereld');
                this.gameWereld = document.querySelector('#game-wereld');
                this.lucht = document.querySelector('#lucht');
                this.fader = document.querySelector('#fader');
                this.speler = document.querySelector('#player');
                this.scene = document.querySelector('a-scene');
                
                this.levels = [
                    { id: 1, naam: "Makkelijk", doel: 10, maxMissers: 10, interval: 3000 },
                    { id: 2, naam: "Normaal",   doel: 20, maxMissers: 8,  interval: 2000 },
                    { id: 3, naam: "Moeilijk",  doel: 30, maxMissers: 5,  interval: 1200 }
                ];
                this.huidigLevel = 0; 
                
                const knoppen = document.querySelectorAll('.clickable');
                knoppen.forEach(knop => {
                    knop.addEventListener('click', () => {
                        document.querySelector('#audio-klik').components.sound.playSound();
                    });
                });

                document.querySelector('#btn-start').addEventListener('click', () => this.startGame());
                
                const btnLevel = document.querySelector('#btn-level');
                btnLevel.addEventListener('click', () => {
                    this.huidigLevel++;
                    if (this.huidigLevel >= this.levels.length) {
                        this.huidigLevel = 0; 
                    }
                    const lvl = this.levels[this.huidigLevel];
                    btnLevel.setAttribute('dynamische-tekst', 'tekst', `LEVEL ${lvl.id}: ${lvl.naam}`);
                });

                this.infoBord = document.querySelector('#info-bord');
                const btnInfo = document.querySelector('#btn-info');

                btnInfo.addEventListener('click', () => {
                    const isZichtbaar = this.infoBord.getAttribute('visible');
                    this.infoBord.setAttribute('visible', !isZichtbaar);
                    
                    if (!isZichtbaar) {
                        btnInfo.setAttribute('dynamische-tekst', 'tekst: SLUIT INFO; bgKleur: #EF476F; kleur: #FFFFFF; fontSize: 45');
                    } else {
                        btnInfo.setAttribute('dynamische-tekst', 'tekst: INFO; bgKleur: #FFD166; kleur: #000000; fontSize: 50');
                    }
                });
            },
            startGame: function() {
                this.fader.emit('fade-out');
                document.querySelector('#audio-swoosh').components.sound.playSound();

                setTimeout(() => {
                    this.menuWereld.setAttribute('visible', 'false');
                    this.gameWereld.setAttribute('visible', 'true');
                    this.lucht.setAttribute('color', '#87CEEB'); 

                    const lvl = this.levels[this.huidigLevel];

                    this.scene.setAttribute('score-manager', {doel: lvl.doel, maxMissers: lvl.maxMissers});
                    this.scene.setAttribute('printer-spawner', {interval: lvl.interval});

                    this.scene.components['score-manager'].resetScore();
                    this.scene.components['printer-spawner'].startSpawning();

                    document.querySelector('#audio-ambient').components.sound.playSound();
                    this.fader.emit('fade-in');
                }, 1000); 
            },
            endGame: function(gewonnen) {
                const faderTekst = document.querySelector('#fader-tekst');
                
                if (gewonnen) {
                    faderTekst.setAttribute('value', 'GEFELICITEERD!\nLevel Gehaald');
                    faderTekst.setAttribute('color', '#06D6A0'); 
                } else {
                    faderTekst.setAttribute('value', 'HELAAS...\nProbeer het opnieuw');
                    faderTekst.setAttribute('color', '#EF476F'); 
                }

                this.fader.emit('fade-out');
                faderTekst.emit('fade-out'); 
                
                document.querySelector('#audio-swoosh').components.sound.playSound();
                document.querySelector('#audio-ambient').components.sound.stopSound();

                this.scene.components['printer-spawner'].stopSpawning();

                setTimeout(() => {
                    this.speler.setAttribute('position', '-3 0 2');
                    this.speler.components['muur-botsing'].vorigePos = { x: -3, z: 2 }; 
                    this.gameWereld.setAttribute('visible', 'false');
                    this.menuWereld.setAttribute('visible', 'true');
                    this.lucht.setAttribute('color', '#2B2D42'); 
                    
                    this.fader.emit('fade-in');
                    faderTekst.emit('fade-in'); 
                }, 2500); 
            }
        });

        // ==============================================
        // 2. MUUR BOTSING
        // ==============================================
        AFRAME.registerComponent('muur-botsing', {
            dependencies: ['movement-controls'], 
            init: function() {
                this.muren = document.querySelectorAll('.muur');
                this.gameWereld = document.querySelector('#game-wereld');
                this.spelerRadius = 0.2;
            },
            tick: function () {
                const pos = this.el.object3D.position;
                pos.y = 0; 
                
                if (!this.vorigePos) { 
                    this.vorigePos = { x: pos.x, z: pos.z }; 
                    return; 
                }
                
                if (this.gameWereld.getAttribute('visible') === 'false') return;

                const checkBotsing = (testX, testZ) => {
                    const pL = testX - this.spelerRadius; 
                    const pR = testX + this.spelerRadius; 
                    const pT = testZ - this.spelerRadius; 
                    const pB = testZ + this.spelerRadius; 
                    
                    for (let i = 0; i < this.muren.length; i++) {
                        const muur = this.muren[i];
                        const mPos = muur.getAttribute('position');
                        const breedte = parseFloat(muur.getAttribute('width'));
                        const diepte = parseFloat(muur.getAttribute('depth'));
                        
                        if (!mPos || isNaN(breedte) || isNaN(diepte)) continue;
                        
                        const mL = mPos.x - (breedte / 2); 
                        const mR = mPos.x + (breedte / 2);
                        const mT = mPos.z - (diepte / 2);  
                        const mB = mPos.z + (diepte / 2);
                        
                        if (pR > mL && pL < mR && pB > mT && pT < mB) return true; 
                    }
                    return false; 
                };

                if (checkBotsing(pos.x, pos.z)) {
                    const kanGlijdenOverX = !checkBotsing(pos.x, this.vorigePos.z);
                    const kanGlijdenOverZ = !checkBotsing(this.vorigePos.x, pos.z);
                    
                    if (kanGlijdenOverX && !kanGlijdenOverZ) { 
                        pos.z = this.vorigePos.z; 
                        this.vorigePos.x = pos.x; 
                    } else if (kanGlijdenOverZ && !kanGlijdenOverX) { 
                        pos.x = this.vorigePos.x; 
                        this.vorigePos.z = pos.z; 
                    } else { 
                        pos.x = this.vorigePos.x; 
                        pos.z = this.vorigePos.z; 
                    }
                } else {
                    this.vorigePos.x = pos.x; 
                    this.vorigePos.z = pos.z;
                }
            }
        });

        // ==============================================
        // 3. SCORE MANAGER
        // ==============================================
        AFRAME.registerComponent('score-manager', {
            schema: { 
                doel: {type: 'number', default: 20}, 
                maxMissers: {type: 'number', default: 10} 
            }, 
            init: function() {
                this.score = 0;
                this.missers = 0; 
                this.tekstBox = document.querySelector('#scorebord-box');
            },
            resetScore: function() {
                this.score = 0; 
                this.missers = 0; 
                this.updateScorebord();
            },
            verhoogScore: function() {
                if (this.score >= this.data.doel || this.missers >= this.data.maxMissers) return; 
                this.score++; 
                this.updateScorebord();
                
                if (this.score >= this.data.doel) {
                    document.querySelector('#audio-win').components.sound.playSound();
                    this.el.components['game-manager'].endGame(true);
                }
            },
            verhoogMissers: function() { 
                if (this.score >= this.data.doel || this.missers >= this.data.maxMissers) return;
                this.missers++; 
                this.updateScorebord();
                
                if (this.missers >= this.data.maxMissers) {
                    this.el.components['game-manager'].endGame(false);
                }
            },
            updateScorebord: function() { 
                this.tekstBox.setAttribute(
                    'dynamische-tekst', 
                    'tekst', 
                    `Gevangen: ${this.score}/${this.data.doel} | Gemist: ${this.missers}/${this.data.maxMissers}`
                );
            }
        });

        // ==============================================
        // 4. VANGBAAR
        // ==============================================
        AFRAME.registerComponent('vangbaar', {
            schema: { radius: {type: 'number', default: 0.4} }, 
            init: function() {
                // Cache elementen en vectoren in init om garbage collection stutter in tick te voorkomen
                this.handL = document.querySelector('#linker-hand');
                this.handR = document.querySelector('#rechter-hand');
                this.camera = document.querySelector('#camera');
                this.scene = document.querySelector('a-scene');
                
                this.posL = new THREE.Vector3(); 
                this.posR = new THREE.Vector3(); 
                this.posCam = new THREE.Vector3();
                this.mokPos = new THREE.Vector3();
            },
            tick: function() {
                if (this.el.object3D.position.y <= 0.06) return;
                
                const papierPos = this.el.object3D.position;
                let gevangen = false;

                if (this.handL && this.handL.object3D) this.handL.object3D.getWorldPosition(this.posL);
                if (this.handR && this.handR.object3D) this.handR.object3D.getWorldPosition(this.posR);
                if (this.camera && this.camera.object3D) this.camera.object3D.getWorldPosition(this.posCam);

                if (this.posL.distanceTo(papierPos) < this.data.radius || 
                    this.posR.distanceTo(papierPos) < this.data.radius || 
                    this.posCam.distanceTo(papierPos) < 1.0) {
                    gevangen = true;
                }

                // Zoek alleen naar mokken als we nog niet gevangen zijn
                if (!gevangen) {
                    const vliegendeMokken = document.querySelectorAll('.vliegend');
                    for (let i = 0; i < vliegendeMokken.length; i++) {
                        vliegendeMokken[i].object3D.getWorldPosition(this.mokPos);
                        if (this.mokPos.distanceTo(papierPos) < this.data.radius + 0.3) {
                            gevangen = true;
                            break; 
                        }
                    }
                }

                if (gevangen) {
                    document.querySelector('#audio-plop').components.sound.playSound();
                    this.scene.components['score-manager'].verhoogScore();
                    if (this.el.parentNode) {
                        this.el.parentNode.removeChild(this.el);
                    }
                }
            }
        });

        // ==============================================
        // 5. DE PRINTER SPAWNER
        // ==============================================
        AFRAME.registerComponent('printer-spawner', {
            schema: { interval: {type: 'number', default: 3000} },
            init: function() { 
                this.timer = null; 
            },
            startSpawning: function() {
                if (this.timer) clearInterval(this.timer);
                
                this.timer = setInterval(() => {
                    document.querySelector('#audio-schiet').components.sound.playSound();
                    
                    const papier = document.createElement('a-entity');
                    papier.setAttribute('class', 'papier');
                    papier.setAttribute('geometry', 'primitive: plane; width: 0.21; height: 0.29');
                    papier.setAttribute('material', 'color: white; side: double');
                    papier.setAttribute('position', {x: -9.5, y: 0.8, z: 2.8}); 
                    papier.setAttribute('dwarrel-papier', '');
                    papier.setAttribute('vangbaar', 'radius: 0.4'); 
                    
                    this.el.sceneEl.appendChild(papier);
                }, this.data.interval); 
            },
            stopSpawning: function() {
                if (this.timer) clearInterval(this.timer);
                
                document.querySelectorAll('.papier').forEach(p => {
                    if (p.parentNode) p.parentNode.removeChild(p);
                });
            }
        });

        // ==============================================
        // 6. HET DWARREL-SCRIPT
        // ==============================================
        AFRAME.registerComponent('dwarrel-papier', {
            init: function() {
                this.vx = 6 + Math.random() * 8; 
                this.vy = 4 + Math.random() * 4; 
                this.vz = -8 + Math.random() * 16; 
                this.scene = document.querySelector('a-scene');
            },
            tick: function(t, dt) {
                const d = dt / 1000;
                const pos = this.el.getAttribute('position');
                const rot = this.el.getAttribute('rotation');

                this.vy -= 4 * d;
                this.vx *= 0.98; 
                this.vz *= 0.98;
                
                if (this.vy < -0.8) this.vy = -0.8; 

                pos.x += this.vx * d; 
                pos.y += this.vy * d; 
                pos.z += this.vz * d;
                
                if (pos.y > 2.9) {
                    pos.y = 2.9; 
                    this.vy = -2; 
                }

                rot.x += (this.vx * 2) + 1; 
                rot.y += 2; 
                rot.z += (this.vz * 2) + 1;

                this.el.setAttribute('position', pos);
                this.el.setAttribute('rotation', rot);

                if (pos.y <= 0.05) {
                    pos.y = 0.05; 
                    rot.x = -90; 
                    rot.y = Math.random() * 360; 
                    rot.z = 0;
                    
                    this.el.setAttribute('position', pos);
                    this.el.setAttribute('rotation', rot);
                    
                    this.scene.components['score-manager'].verhoogMissers();
                    
                    this.el.removeAttribute('vangbaar'); 
                    this.el.removeAttribute('dwarrel-papier');
                }
            }
        });

        // ==============================================
        // 7. MOK INTERACTIE
        // ==============================================
        AFRAME.registerComponent('mok-interactie', {
            init: function() {
                this.status = 'idle'; 
                this.snelheid = new THREE.Vector3();
                this.hand = null;
                
                // Voorkom aanmaken van nieuwe vectoren in tick
                this.handPos = new THREE.Vector3();
                this.handRot = new THREE.Quaternion();
                this.gooiRichting = new THREE.Vector3();
                
                this.el.addEventListener('click', (evt) => {
                    if (this.status === 'idle') {
                        this.status = 'vast';
                        this.hand = evt.detail.cursorEl || document.querySelector('#camera');
                        
                        setTimeout(() => {
                            this.gooiHandler = () => {
                                if (this.status === 'vast') {
                                    this.status = 'gooi';
                                    this.el.setAttribute('class', 'mok vliegend');
                                    
                                    this.gooiRichting.set(0, 0, -1);
                                    this.gooiRichting.applyQuaternion(this.hand.object3D.getWorldQuaternion(new THREE.Quaternion()));
                                    
                                    this.snelheid.copy(this.gooiRichting).multiplyScalar(6); 
                                    this.snelheid.y += 3; 
                                    
                                    if (this.isVRHand) {
                                        this.hand.removeEventListener('triggerup', this.gooiHandler);
                                    } else {
                                        window.removeEventListener('click', this.gooiHandler);
                                    }
                                }
                            };
                            
                            this.isVRHand = this.hand.hasAttribute('laser-controls');

                            if (this.isVRHand) {
                                // Aangepast naar triggerup voor natuurlijk VR werpen
                                this.hand.addEventListener('triggerup', this.gooiHandler);
                            } else {
                                window.addEventListener('click', this.gooiHandler);
                            }
                        }, 100);
                    }
                });
            },
            tick: function(t, dt) {
                const d = dt / 1000;
                
                if (this.status === 'vast' && this.hand) {
                    this.hand.object3D.getWorldPosition(this.handPos);
                    this.hand.object3D.getWorldQuaternion(this.handRot);
                    
                    const offsetZ = this.isVRHand ? -0.1 : -0.3;
                    const offset = new THREE.Vector3(0, -0.05, offsetZ);
                    offset.applyQuaternion(this.handRot);
                    
                    this.el.object3D.position.copy(this.handPos).add(offset);
                    this.el.object3D.quaternion.copy(this.handRot);
                    
                } else if (this.status === 'gooi') {
                    this.snelheid.y -= 9.81 * d; 
                    
                    this.el.object3D.position.x += this.snelheid.x * d;
                    this.el.object3D.position.y += this.snelheid.y * d;
                    this.el.object3D.position.z += this.snelheid.z * d;
                    this.el.object3D.rotation.x += 5 * d; 
                    
                    if (this.el.object3D.position.y <= 0.1) {
                        this.el.object3D.position.y = 0.1;
                        this.status = 'idle';
                        this.snelheid.set(0, 0, 0);
                        this.el.object3D.rotation.x = 0; 
                        this.el.setAttribute('class', 'mok clickable'); 
                    }
                }
            }
        });

        // ==============================================
        // 8. MUIS GEDRAG
        // ==============================================
        AFRAME.registerComponent('muis-gedrag', {
            init: function() {
                this.gameWereld = document.querySelector('#game-wereld');
                this.el.sceneEl.addEventListener('renderstart', () => {
                    this.planVolgendeSprint();
                });
            },
            planVolgendeSprint: function() {
                const wachttijd = (Math.random() * 6000) + 4000;
                
                setTimeout(() => {
                    const gameZichtbaar = this.gameWereld.getAttribute('visible');
                    if (gameZichtbaar === true || gameZichtbaar === "true") {
                        this.startSprint();
                    } else {
                        this.planVolgendeSprint();
                    }
                }, wachttijd);
            },
            startSprint: function() {
                const startX = (Math.random() * -8) - 1.5; 
                const startZ = (Math.random() * 6) + 1;
                const eindX = (Math.random() * -8) - 1.5;
                const eindZ = (Math.random() * 6) + 1;

                const afstand = Math.sqrt(Math.pow(eindX - startX, 2) + Math.pow(eindZ - startZ, 2));
                
                if (afstand < 3) { 
                    this.startSprint(); 
                    return; 
                }

                const dx = eindX - startX;
                const dz = eindZ - startZ;
                const hoekRad = Math.atan2(dx, dz);
                const hoekDeg = hoekRad * (180 / Math.PI);

                this.el.setAttribute('position', {x: startX, y: 0.02, z: startZ});
                this.el.setAttribute('rotation', {x: 0, y: hoekDeg + 90, z: 0});
                this.el.setAttribute('visible', 'true');
                
                const looptijd = afstand * 500; 

                this.el.setAttribute('animation__run', {
                    property: 'position',
                    to: {x: eindX, y: 0.02, z: eindZ},
                    dur: looptijd,
                    easing: 'linear'
                });

                setTimeout(() => {
                    this.el.setAttribute('visible', 'false');
                    this.el.removeAttribute('animation__run'); 
                    this.planVolgendeSprint();
                }, looptijd);
            }
        });
    </script>
</head>
<body>
    <a-scene platform-manager printer-spawner score-manager game-manager>
        
        <a-assets>
            <a-asset-item id="kantoor-model" src="models/kantoor/scene.gltf"></a-asset-item>
            <a-asset-item id="mouse-model" src="models/mouse/scene.gltf"></a-asset-item>
            <img id="plafond-tex" src="textures/Ceiling.jpg" alt="Plafond Textuur">
            
            <audio id="snd-ambient" src="audio/kantoor-ambient.mp3" preload="auto"></audio>
            <audio id="snd-klik" src="audio/knop-klik.mp3" preload="auto"></audio>
            <audio id="snd-swoosh" src="audio/swoosh.mp3" preload="auto"></audio>
            <audio id="snd-schiet" src="audio/printer-schiet.mp3" preload="auto"></audio>
            <audio id="snd-plop" src="audio/vang-plop.mp3" preload="auto"></audio>
            <audio id="snd-win" src="audio/win-succes.mp3" preload="auto"></audio>
        </a-assets>

        <a-entity id="audio-ambient" sound="src: #snd-ambient; loop: true; volume: 0.5; positional: false"></a-entity>
        <a-entity id="audio-klik" sound="src: #snd-klik; poolSize: 4; volume: 0.8"></a-entity>
        <a-entity id="audio-swoosh" sound="src: #snd-swoosh; poolSize: 2; volume: 0.6"></a-entity>
        <a-entity id="audio-schiet" sound="src: #snd-schiet; poolSize: 3; volume: 0.7"></a-entity>
        <a-entity id="audio-plop" sound="src: #snd-plop; poolSize: 5; volume: 1.0"></a-entity>
        <a-entity id="audio-win" sound="src: #snd-win; volume: 1.0"></a-entity>

        <a-light id="ambient-licht" type="ambient" color="#FFF" intensity="0.6"></a-light>
        <a-light type="directional" position="5 10 5" intensity="0.8" target="#player"></a-light>

        <a-entity id="player" position="-3 0 2" movement-controls="speed: 0.15" muur-botsing>
            <a-entity id="camera" camera position="0 1.6 0" look-controls>
                <a-cursor id="pc-cursor" raycaster="objects: .clickable" color="#FFD166"></a-cursor>
                
                <a-plane id="fader" position="0 0 -0.2" width="2" height="2" color="#000" material="opacity: 0; transparent: true; shader: flat"
                         animation__out="property: material.opacity; from: 0; to: 1; dur: 1000; startEvents: fade-out"
                         animation__in="property: material.opacity; from: 1; to: 0; dur: 1000; startEvents: fade-in">
                    <a-text id="fader-tekst" value="" align="center" position="0 0 0.01" scale="0.08 0.08 0.08" color="#FFFFFF" opacity="0"
                            animation__out="property: opacity; from: 0; to: 1; dur: 1000; startEvents: fade-out"
                            animation__in="property: opacity; from: 1; to: 0; dur: 1000; startEvents: fade-in">
                    </a-text>
                </a-plane>
            </a-entity>
            
            <a-entity id="linker-hand" laser-controls="hand: left" raycaster="objects: .papier, .clickable, .mok"></a-entity>
